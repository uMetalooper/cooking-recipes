<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooking Recipes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #8b2500;
      --red-lt: #b83a00;
      --bg:     #fdf6ec;
      --card:   #ffffff;
      --border: #e8d5c0;
      --muted:  #9a7060;
      --text:   #2c1810;
      --step-done: #c8e6c9;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--red);
      color: #fdf6ec;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #back-btn {
      background: none;
      border: none;
      color: inherit;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      display: none;
    }
    #back-btn:hover { background: rgba(255,255,255,0.15); }

    header h1 { font-size: 1.4rem; flex: 1; }
    header p   { font-size: 0.8rem; opacity: 0.75; font-family: sans-serif; margin-top: 0.15rem; }

    /* ── Tabs ── */
    #tab-bar {
      display: none;
      background: var(--red-lt);
    }

    #tab-bar button {
      flex: 1;
      padding: 0.75rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      font-family: sans-serif;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    #tab-bar button.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    #tab-bar { display: none; }
    #tab-bar.visible { display: flex; }

    /* ── Main ── */
    main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    .loading { text-align: center; padding: 3rem; opacity: 0.4; font-family: sans-serif; }

    /* ── Recipe list ── */
    #view-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }

    .recipe-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.3rem 1.1rem;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .recipe-card:hover { box-shadow: 0 4px 16px rgba(139,37,0,0.15); transform: translateY(-2px); }
    .recipe-card h2 { font-size: 1.1rem; color: var(--red); }
    .recipe-card p  { margin-top: 0.4rem; font-size: 0.8rem; color: var(--muted); font-family: sans-serif; }

    /* ── Views ── */
    #view-shopping, #view-cooking { display: none; }

    /* ── Shopping ── */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 1.4rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: var(--red);
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s;
    }
    .progress-label {
      font-family: sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }

    .section-header {
      font-size: 0.7rem;
      font-family: sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.4rem 0 0.5rem;
    }

    .ingredient-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.8rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.4rem;
      cursor: pointer;
      transition: opacity 0.2s;
      user-select: none;
    }
    .ingredient-item.checked {
      opacity: 0.45;
      text-decoration: line-through;
    }

    .ingredient-item input[type=checkbox] {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      flex-shrink: 0;
      cursor: pointer;
    }

    .clear-btn {
      margin-top: 1.5rem;
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: sans-serif;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Cooking ── */
    .step-item {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .step-item.done { background: var(--step-done); border-color: #a5d6a7; }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-family: sans-serif;
      font-weight: bold;
      flex-shrink: 0;
    }
    .step-item.done .step-number { background: #4caf50; }

    .step-text { line-height: 1.65; padding-top: 0.05rem; }
    .step-text strong { color: var(--red); }
    .step-item.done .step-text { opacity: 0.6; }

    .reset-steps-btn {
      margin-top: 1rem;
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: sans-serif;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-steps-btn:hover { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
  <header>
    <button id="back-btn" onclick="goBack()" aria-label="Back">&#8592;</button>
    <div>
      <h1 id="header-title">Cooking Recipes</h1>
      <p id="header-sub">A collection of Vietnamese home recipes</p>
    </div>
  </header>

  <div id="tab-bar">
    <button id="tab-shopping" onclick="navigate(currentRecipe, 'shopping')">🛒 Shopping</button>
    <button id="tab-cooking"  onclick="navigate(currentRecipe, 'cooking')">🍳 Cooking</button>
  </div>

  <main>
    <div id="view-list"></div>
    <div id="view-shopping"></div>
    <div id="view-cooking"></div>
  </main>

  <script>
    // ── Recipe registry ──────────────────────────────────────────────────────
    const RECIPES = [
      { slug: "bun-bo-hue", title: "Bún Bò Huế", file: "bun-bo-hue.md", description: "Spicy lemongrass beef noodle soup from Hue" }
    ];

    const bySlug = Object.fromEntries(RECIPES.map(r => [r.slug, r]));

    // ── Markdown parser ──────────────────────────────────────────────────────
    // Returns { ingredients: [{section, items:[]}], steps: [string] }
    function parseRecipe(md) {
      const lines = md.split('\n');
      const ingredients = [];
      const steps = [];
      let section = null;

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;

        // Bold section header: **Foo**
        if (/^\*\*[^*]+\*\*$/.test(line)) {
          section = { title: line.replace(/\*\*/g, ''), items: [] };
          ingredients.push(section);
        }
        // Bullet ingredient: * item
        else if (/^\* .+/.test(line)) {
          if (section) section.items.push(line.slice(2));
        }
        // Numbered step: 1. text
        else if (/^\d+\. .+/.test(line)) {
          steps.push(line.replace(/^\d+\. /, ''));
        }
      }
      return { ingredients, steps };
    }

    // ── localStorage helpers ─────────────────────────────────────────────────
    function lsKey(slug) { return `shopping:${slug}`; }

    function getChecked(slug) {
      try { return new Set(JSON.parse(localStorage.getItem(lsKey(slug)) || '[]')); }
      catch { return new Set(); }
    }

    function setChecked(slug, set) {
      localStorage.setItem(lsKey(slug), JSON.stringify([...set]));
    }

    function stepKey(slug) { return `steps:${slug}`; }

    function getDoneSteps(slug) {
      try { return new Set(JSON.parse(localStorage.getItem(stepKey(slug)) || '[]')); }
      catch { return new Set(); }
    }

    function setDoneSteps(slug, set) {
      localStorage.setItem(stepKey(slug), JSON.stringify([...set]));
    }

    // ── Cache for fetched markdown ───────────────────────────────────────────
    const mdCache = {};

    async function fetchMd(recipe) {
      if (!mdCache[recipe.slug]) {
        const res = await fetch(recipe.file);
        mdCache[recipe.slug] = await res.text();
      }
      return mdCache[recipe.slug];
    }

    // ── Routing ──────────────────────────────────────────────────────────────
    // Hash format:  #slug/shopping  or  #slug/cooking  or  # (list)

    let currentRecipe = null;

    function navigate(recipe, page) {
      const hash = recipe ? `#${recipe.slug}/${page}` : '#';
      location.hash = hash;
    }

    function goBack() {
      // If on shopping/cooking → go to list
      location.hash = '#';
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', render);

    async function render() {
      const hash  = location.hash.replace(/^#\/?/, '');
      const parts = hash.split('/');
      const slug  = parts[0];
      const page  = parts[1];
      const recipe = bySlug[slug];

      // ── List view ──
      if (!recipe) {
        currentRecipe = null;
        showView('list');
        document.getElementById('header-title').textContent = 'Cooking Recipes';
        document.getElementById('header-sub').textContent   = 'A collection of Vietnamese home recipes';
        document.getElementById('back-btn').style.display   = 'none';
        document.getElementById('tab-bar').classList.remove('visible');
        renderList();
        return;
      }

      currentRecipe = recipe;
      document.getElementById('header-title').textContent = recipe.title;
      document.getElementById('header-sub').textContent   = page === 'shopping' ? 'Shopping list' : 'Cooking steps';
      document.getElementById('back-btn').style.display   = 'block';
      document.getElementById('tab-bar').classList.add('visible');
      document.getElementById('tab-shopping').classList.toggle('active', page === 'shopping');
      document.getElementById('tab-cooking').classList.toggle('active',  page === 'cooking');

      showView(page === 'cooking' ? 'cooking' : 'shopping');

      const el = document.getElementById(`view-${page === 'cooking' ? 'cooking' : 'shopping'}`);
      el.innerHTML = '<div class="loading">Loading…</div>';

      try {
        const md = await fetchMd(recipe);
        const { ingredients, steps } = parseRecipe(md);

        if (page === 'cooking') renderCooking(recipe, steps, el);
        else                    renderShopping(recipe, ingredients, el);
      } catch {
        el.innerHTML = '<p style="padding:2rem;opacity:0.5">Could not load recipe.</p>';
      }
    }

    function showView(name) {
      ['list', 'shopping', 'cooking'].forEach(v => {
        document.getElementById(`view-${v}`).style.display = v === name ? '' : 'none';
      });
    }

    // ── List renderer ────────────────────────────────────────────────────────
    function renderList() {
      const el = document.getElementById('view-list');
      el.innerHTML = '';
      RECIPES.forEach(recipe => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `<h2>${recipe.title}</h2><p>${recipe.description}</p>`;
        card.onclick = () => navigate(recipe, 'shopping');
        el.appendChild(card);
      });
    }

    // ── Shopping renderer ────────────────────────────────────────────────────
    function renderShopping(recipe, ingredients, el) {
      const checked = getChecked(recipe.slug);
      const allItems = ingredients.flatMap(s => s.items);
      const total = allItems.length;

      el.innerHTML = '';

      // Progress
      const progressLabel = document.createElement('div');
      progressLabel.className = 'progress-label';
      el.appendChild(progressLabel);

      const progressWrap = document.createElement('div');
      progressWrap.className = 'progress-bar-wrap';
      const progressFill = document.createElement('div');
      progressFill.className = 'progress-bar-fill';
      progressWrap.appendChild(progressFill);
      el.appendChild(progressWrap);

      function updateProgress() {
        const done = allItems.filter(item => checked.has(item)).length;
        progressFill.style.width = total ? `${(done / total) * 100}%` : '0%';
        progressLabel.innerHTML = `<span>${done} of ${total} items</span><span>${Math.round((done/total)*100)||0}%</span>`;
      }

      // Sections + items
      ingredients.forEach(section => {
        const sHeader = document.createElement('div');
        sHeader.className = 'section-header';
        sHeader.textContent = section.title;
        el.appendChild(sHeader);

        section.items.forEach(item => {
          const row = document.createElement('label');
          row.className = 'ingredient-item' + (checked.has(item) ? ' checked' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = checked.has(item);
          cb.addEventListener('change', () => {
            if (cb.checked) checked.add(item); else checked.delete(item);
            setChecked(recipe.slug, checked);
            row.classList.toggle('checked', cb.checked);
            updateProgress();
          });

          row.appendChild(cb);
          row.appendChild(document.createTextNode(item));
          el.appendChild(row);
        });
      });

      // Clear button
      const clearBtn = document.createElement('button');
      clearBtn.className = 'clear-btn';
      clearBtn.textContent = 'Clear all checks';
      clearBtn.onclick = () => {
        checked.clear();
        setChecked(recipe.slug, checked);
        renderShopping(recipe, ingredients, el);
      };
      el.appendChild(clearBtn);

      updateProgress();
    }

    // ── Cooking renderer ─────────────────────────────────────────────────────
    function renderCooking(recipe, steps, el) {
      const done = getDoneSteps(recipe.slug);
      el.innerHTML = '';

      steps.forEach((step, i) => {
        const row = document.createElement('div');
        row.className = 'step-item' + (done.has(i) ? ' done' : '');

        const num = document.createElement('div');
        num.className = 'step-number';
        num.textContent = i + 1;

        const text = document.createElement('div');
        text.className = 'step-text';
        // Render **bold** inline
        text.innerHTML = step.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

        row.appendChild(num);
        row.appendChild(text);
        row.onclick = () => {
          if (done.has(i)) done.delete(i); else done.add(i);
          setDoneSteps(recipe.slug, done);
          row.classList.toggle('done', done.has(i));
          num.style.background = done.has(i) ? '#4caf50' : '';
        };

        el.appendChild(row);
      });

      const resetBtn = document.createElement('button');
      resetBtn.className = 'reset-steps-btn';
      resetBtn.textContent = 'Reset all steps';
      resetBtn.onclick = () => {
        done.clear();
        setDoneSteps(recipe.slug, done);
        renderCooking(recipe, steps, el);
      };
      el.appendChild(resetBtn);
    }
  </script>
</body>
</html>
