<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooking Recipes</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf6ec;
      color: #2c1810;
      min-height: 100vh;
    }

    header {
      background: #8b2500;
      color: #fdf6ec;
      padding: 2rem;
      text-align: center;
    }

    header h1 { font-size: 2.2rem; letter-spacing: 0.05em; }
    header p  { margin-top: 0.4rem; opacity: 0.8; font-size: 1rem; }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }

    /* Recipe grid */
    #recipe-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .recipe-card {
      background: #fff;
      border: 1px solid #e8d5c0;
      border-radius: 10px;
      padding: 1.4rem 1.2rem;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }

    .recipe-card:hover {
      box-shadow: 0 4px 16px rgba(139,37,0,0.15);
      transform: translateY(-2px);
    }

    .recipe-card h2 { font-size: 1.15rem; color: #8b2500; }
    .recipe-card p  { margin-top: 0.4rem; font-size: 0.85rem; opacity: 0.65; font-family: sans-serif; }

    /* Recipe detail */
    #recipe-detail { display: none; }

    #back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: 1px solid #8b2500;
      color: #8b2500;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 1.5rem;
      font-family: sans-serif;
      transition: background 0.15s;
    }

    #back-btn:hover { background: #8b250015; }

    #recipe-content {
      background: #fff;
      border: 1px solid #e8d5c0;
      border-radius: 12px;
      padding: 2rem;
      line-height: 1.75;
    }

    #recipe-content h1,
    #recipe-content h2,
    #recipe-content h3 {
      color: #8b2500;
      margin: 1.2rem 0 0.5rem;
    }

    #recipe-content ul, #recipe-content ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }

    #recipe-content li { margin: 0.3rem 0; }

    #recipe-content strong { color: #5a1a00; }

    #recipe-content p { margin: 0.6rem 0; }

    .loading {
      text-align: center;
      padding: 3rem;
      font-family: sans-serif;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cooking Recipes</h1>
    <p>A collection of Vietnamese home recipes</p>
  </header>

  <main>
    <div id="recipe-list"></div>

    <div id="recipe-detail">
      <button id="back-btn" onclick="showList()">&#8592; Back</button>
      <div id="recipe-content"></div>
    </div>
  </main>

  <script>
    // Add new recipes here: { title, file, description }
    const RECIPES = [
      {
        title: "Bún Bò Huế",
        file: "bun-bo-hue.md",
        description: "Spicy lemongrass beef noodle soup from Hue"
      }
    ];

    const listEl    = document.getElementById('recipe-list');
    const detailEl  = document.getElementById('recipe-detail');
    const contentEl = document.getElementById('recipe-content');

    function showList() {
      detailEl.style.display = 'none';
      listEl.style.display   = '';
    }

    async function showRecipe(recipe) {
      listEl.style.display   = 'none';
      detailEl.style.display = 'block';
      contentEl.innerHTML    = '<div class="loading">Loading…</div>';

      try {
        const res  = await fetch(recipe.file);
        const text = await res.text();
        contentEl.innerHTML = `<h1>${recipe.title}</h1>` + marked.parse(text);
      } catch (e) {
        contentEl.innerHTML = '<p>Could not load recipe.</p>';
      }
    }

    // Render cards
    RECIPES.forEach(recipe => {
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.innerHTML = `<h2>${recipe.title}</h2><p>${recipe.description}</p>`;
      card.onclick = () => showRecipe(recipe);
      listEl.appendChild(card);
    });
  </script>
</body>
</html>
